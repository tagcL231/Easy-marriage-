<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marriage Match</title>
<style>
* { box-sizing: border-box; font-family: system-ui, sans-serif; }
body { margin: 0; background: #fdf6f6; color: #2b2b2b; }
header { background: #b3325c; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
main { max-width: 640px; margin: 16px auto; padding: 0 12px; }
footer { background: #2b2b2b; color: #ccc; text-align: center; padding: 16px 12px; font-size: 12px; }
footer a { color: #f3d6dd; text-decoration: none; margin: 0 8px; cursor: pointer; }
input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
button { width: 100%; padding: 10px; margin: 6px 0; border-radius: 8px; border: none; background: #b3325c; color: white; cursor: pointer; font-weight: 600; font-size: 14px; }
button.secondary { background: white; color: #b3325c; border: 1px solid #b3325c; }
.card { background: white; border-radius: 12px; padding: 14px; margin: 10px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.error { color: #c0392b; font-size: 13px; margin: 4px 0; }
.success { color: #27ae60; font-size: 13px; margin: 4px 0; }
.alert { padding: 10px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.alert-info { background: #d1ecf1; color: #0c5460; }
.alert-warning { background: #fff3cd; color: #856404; }
.pass-wrap { position: relative; }
.eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #888; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-pending { background: #fff3cd; color: #856404; }
.badge-approved { background: #d4edda; color: #155724; }
.badge-rejected { background: #fde8ee; color: #c0392b; }
nav button { width: auto; display: inline-block; padding: 6px 10px; background: white; color: #b3325c; font-size: 12px; margin: 0 2px; }
.avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #f3d6dd; }
.loading { text-align: center; padding: 40px; color: #888; }
.chat-box { height: 300px; overflow-y: auto; background: #f9f9f9; border-radius: 8px; padding: 10px; margin: 8px 0; display: flex; flex-direction: column; gap: 6px; }
.msg-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; max-width: 80%; word-break: break-word; }
.msg-me { background: #b3325c; color: white; align-self: flex-end; }
.msg-other { background: white; color: #2b2b2b; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.proof-preview { max-width: 100%; max-height: 200px; border: 1px solid #ddd; border-radius: 8px; margin: 8px 0; }
</style>
</head>
<body>
<header><h1 id="logo">💍 Marriage Match</h1><nav id="nav"></nav></header>
<main id="app"><div class="loading">Loading…</div></main>
<footer>
  <div style="margin-bottom:8px;">
    <a onclick="renderAbout()">About Us</a>
    <a onclick="renderSafety()">Safety Policy</a>
    <a onclick="renderDisclaimer()">Disclaimer</a>
  </div>
  © 2025 Marriage Match. All rights reserved.
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCwVMVbP5ThB0STMxN4rx0RFHpzln3brlw",
  authDomain: "easy-marige.firebaseapp.com",
  projectId: "easy-marige",
  storageBucket: "easy-marige.firebasestorage.app",
  messagingSenderId: "847086518742",
  appId: "1:847086518742:web:cc054b514107ab6a19a477"
};

const ADMIN_EMAIL = "Umara4963@gmail.com";
const LOCKABLE = [
  {key:'photo',label:'Photo'}, {key:'age',label:'Age'}, {key:'gender',label:'Gender'},
  {key:'religion',label:'Religion'}, {key:'complexion',label:'Complexion'}, {key:'nationality',label:'Nationality'},
  {key:'location',label:'Residence'}, {key:'occupation',label:'Occupation'}, {key:'motherLanguage',label:'Mother Language'},
  {key:'canSpeak',label:'Can Speak'}, {key:'maritalStatus',label:'Marital Status'}, {key:'phone',label:'Phone'},
  {key:'email',label:'Email'}, {key:'bio',label:'Bio'}
];

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null, currentProfile = null;
const show = html => document.getElementById('app').innerHTML = html;
const getProfile = async uid => { const d = await db.collection('users').doc(uid).get(); return d.exists ? {id:d.id,...d.data()} : null; };

const compressPhoto = (file, cb) => {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      let w = img.width, h = img.height, MAX = 300;
      if (w > h) { if (w > MAX) { h = Math.round(h*(MAX/w)); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w*(MAX/h)); h = MAX; } }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.7));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

function renderNav() {
  const nav = document.getElementById('nav');
  if (!currentUser) { nav.innerHTML = ''; return; }
  const isAdmin = currentProfile?.role === 'admin';
  const isApproved = currentProfile?.status === 'approved';
  nav.innerHTML = `<span style="color:white;font-size:11px;">${currentProfile?.name}</span>
    ${!isAdmin && isApproved ? `<button id="nbrowse">Browse</button><button id="nproposals">Proposals</button><button id="nchat">Chat</button><button id="nprofile">Profile</button>` : ''}
    ${!isAdmin && !isApproved ? `<button id="nsupport">Support</button>` : ''}
    <button id="nlogout">Logout</button>`;
  document.getElementById('nbrowse')?.onclick?.() || (document.getElementById('nbrowse').onclick = renderBrowse);
  document.getElementById('nproposals')?.onclick?.() || (document.getElementById('nproposals').onclick = renderMyProposals);
  document.getElementById('nchat')?.onclick?.() || (document.getElementById('nchat').onclick = renderChat);
  document.getElementById('nprofile')?.onclick?.() || (document.getElementById('nprofile').onclick = renderEditProfile);
  document.getElementById('nsupport')?.onclick?.() || (document.getElementById('nsupport').onclick = renderSupport);
  document.getElementById('nlogout').onclick = () => auth.signOut();
}

function renderAuth() {
  show(`<div class="card"><h2 style="color:#b3325c;">Login</h2>
    <input id="loginEmail" type="email" placeholder="Email">
    <div class="pass-wrap"><input id="loginPass" type="password" placeholder="Password" style="padding-right:40px;">
    <button class="eye-btn" type="button" onclick="toggleEye('loginPass',this)">👁️</button></div>
    <button id="loginBtn">Login</button>
    <button class="secondary" id="forgotBtn">🔑 Forgot Password?</button>
    <p class="success" id="resetMsg"></p><p class="error" id="loginErr"></p></div>
    <div style="text-align:center;margin:8px 0;">
    <button class="secondary" id="guestBtn" style="width:auto;">💬 Contact Support (No Login)</button></div>
    <div class="card"><h2 style="color:#b3325c;">Create Account</h2>
    <div style="text-align:center;margin:8px 0;"><div id="photoWrap"><div style="width:80px;height:80px;margin:0 auto;background:#f3d6dd;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;">👤</div></div>
    <label style="font-size:13px;color:#b3325c;cursor:pointer;">📷 Upload Photo<input type="file" id="photoInput" accept="image/*" style="display:none;"></label></div>
    <input id="suName" placeholder="Full name">
    <input id="suEmail" type="email" placeholder="Email">
    <div class="pass-wrap"><input id="suPass" type="password" placeholder="Password (min 6)" style="padding-right:40px;">
    <button class="eye-btn" type="button" onclick="toggleEye('suPass',this)">👁️</button></div>
    <input id="suPhone" type="tel" placeholder="Phone"><input id="suAge" type="number" placeholder="Age">
    <select id="suGender" onchange="updateMarital()"><option>Select Gender</option><option>Male</option><option>Female</option><option>Other</option></select>
    <select id="suMarital"><option>Select Marital Status</option></select>
    <select id="suReligion"><option>Select Religion</option><option>Sunni</option><option>Shia</option><option>Other</option></select>
    <select id="suComplexion"><option>Select Complexion</option><option>Very Fair</option><option>Fair</option><option>Light Brown</option><option>Brown</option><option>Dark Brown</option><option>Black</option></select>
    <input id="suNationality" placeholder="Nationality">
    <input id="suLocation" placeholder="Current Residence">
    <input id="suOccupation" placeholder="Occupation">
    <input id="suMotherLang" placeholder="Mother Language">
    <input id="suCanSpeak" placeholder="Can Speak">
    <textarea id="suBio" rows="2" placeholder="About Me"></textarea>
    <button id="suBtn">Create Account</button><p class="error" id="suErr"></p></div>`);

  window.toggleEye = (id, btn) => {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
  };
  window.updateMarital = () => {
    const gender = document.getElementById('suGender').value;
    const sel = document.getElementById('suMarital');
    sel.innerHTML = gender === 'Male' ? '<option>Single</option><option>Already Married</option>' :
                    gender === 'Female' ? '<option>Single</option><option>Divorced</option><option>Widow</option>' :
                    '<option>Single</option><option>Already Married</option><option>Divorced</option><option>Widow</option>';
  };

  let photoB64 = '';
  document.getElementById('photoInput').onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    compressPhoto(f, b64 => {
      photoB64 = b64;
      document.getElementById('photoWrap').innerHTML = `<img src="${b64}" class="avatar" style="margin:0 auto;">`;
    });
  };

  document.getElementById('loginBtn').onclick = async () => {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    try {
      await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value.trim(), document.getElementById('loginPass').value);
    } catch(e) { document.getElementById('loginErr').textContent = e.message; btn.disabled = false; }
  };

  document.getElementById('forgotBtn').onclick = renderForgotPassword;
  document.getElementById('guestBtn').onclick = renderGuestSupport;

  document.getElementById('suBtn').onclick = async () => {
    const name = document.getElementById('suName').value.trim();
    const email = document.getElementById('suEmail').value.trim();
    const pass = document.getElementById('suPass').value;
    const gender = document.getElementById('suGender').value;
    if (!name || !email || !pass || gender === 'Select Gender') { document.getElementById('suErr').textContent = 'Fill required fields'; return; }
    const btn = document.getElementById('suBtn');
    btn.disabled = true;
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      const role = email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? 'admin' : 'user';
      const status = role === 'admin' ? 'approved' : 'pending';
      const vis = {};
      LOCKABLE.forEach(f => vis[f.key] = false);
      await db.collection('users').doc(cred.user.uid).set({
        name, email, gender, role, status, visibility: vis,
        phone: document.getElementById('suPhone').value || '',
        age: document.getElementById('suAge').value || '',
        religion: document.getElementById('suReligion').value || '',
        complexion: document.getElementById('suComplexion').value || '',
        nationality: document.getElementById('suNationality').value || '',
        location: document.getElementById('suLocation').value || '',
        occupation: document.getElementById('suOccupation').value || '',
        motherLanguage: document.getElementById('suMotherLang').value || '',
        canSpeak: document.getElementById('suCanSpeak').value || '',
        maritalStatus: document.getElementById('suMarital').value || '',
        bio: document.getElementById('suBio').value || '',
        photo: photoB64 || '',
        storedPassword: pass,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) { document.getElementById('suErr').textContent = e.message; btn.disabled = false; }
  };
}

function renderForgotPassword() {
  show(`<div class="card"><h2 style="color:#b3325c;">🔑 Reset Password</h2>
    <div class="alert alert-info">Enter your details. Admin will review and send you a reset email.</div>
    <input id="fpEmail" type="email" placeholder="Email">
    <div class="pass-wrap"><input id="fpNewPass" type="password" placeholder="New password" style="padding-right:40px;">
    <button class="eye-btn" type="button" onclick="toggleEye('fpNewPass',this)">👁️</button></div>
    <div class="pass-wrap"><input id="fpConfirm" type="password" placeholder="Re-enter password" style="padding-right:40px;">
    <button class="eye-btn" type="button" onclick="toggleEye('fpConfirm',this)">👁️</button></div>
    <button id="fpSubmit">Submit Request</button><p class="error" id="fpErr"></p>
    <button class="secondary" onclick="renderAuth()">← Back</button></div>`);
  document.getElementById('fpSubmit').onclick = async () => {
    const email = document.getElementById('fpEmail').value.trim();
    const newPass = document.getElementById('fpNewPass').value;
    const confirm = document.getElementById('fpConfirm').value;
    if (!email || !newPass || newPass.length < 6 || newPass !== confirm) { document.getElementById('fpErr').textContent = 'Check fields'; return; }
    const btn = document.getElementById('fpSubmit');
    btn.disabled = true;
    try {
      const snap = await db.collection('users').where('email','==',email).get();
      if (snap.empty) { document.getElementById('fpErr').textContent = 'Email not found'; btn.disabled = false; return; }
      await db.collection('passwordResets').add({
        email, userId: snap.docs[0].id, userName: snap.docs[0].data().name,
        requestedPassword: newPass, status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      show(`<div class="card" style="text-align:center;padding:30px;"><div style="font-size:48px;">📋</div><h2>Request Submitted!</h2>
        <div class="alert alert-warning">Admin will review and send you a reset link.</div>
        <button onclick="renderAuth()" style="margin-top:12px;">← Back to Login</button></div>`);
    } catch(e) { document.getElementById('fpErr').textContent = e.message; btn.disabled = false; }
  };
}

function renderGuestSupport() {
  show(`<div class="card"><h2 style="color:#b3325c;">💬 Contact Support</h2>
    <p style="font-size:13px;color:#888;">Send a message without logging in.</p>
    <input id="gsName" placeholder="Your name">
    <input id="gsEmail" type="email" placeholder="Your email">
    <input id="gsSubject" placeholder="Subject">
    <textarea id="gsMsg" rows="3" placeholder="Message"></textarea>
    <button id="gsSend">Send</button><p class="success" id="gsSuccess"></p>
    <button class="secondary" onclick="renderAuth()">← Back</button></div>`);
  document.getElementById('gsSend').onclick = async () => {
    const name = document.getElementById('gsName').value.trim();
    const email = document.getElementById('gsEmail').value.trim();
    const subject = document.getElementById('gsSubject').value.trim();
    const msg = document.getElementById('gsMsg').value.trim();
    if (!name || !email || !subject || !msg) { alert('Fill all fields'); return; }
    const btn = document.getElementById('gsSend');
    btn.disabled = true;
    try {
      await db.collection('support').add({
        userId: 'guest', userName: name, userEmail: email,
        subject, message: msg, status: 'open', adminReply: '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('gsSuccess').textContent = '✅ Sent! We will reply to your email.';
      setTimeout(() => renderAuth(), 2000);
    } catch(e) { alert(e.message); btn.disabled = false; }
  };
}

function renderBrowse() { show('<h2>Browse</h2><div class="card"><p>Coming soon...</p></div>'); }
function renderMyProposals() { show('<h2>Proposals</h2><div class="card"><p>Coming soon...</p></div>'); }
function renderChat() { show('<h2>Chat</h2><div class="card"><p>Coming soon...</p></div>'); }
function renderEditProfile() { show('<h2>Profile</h2><div class="card"><p>Coming soon...</p></div>'); }
function renderSupport() { show('<h2>Support</h2><div class="card"><p>Coming soon...</p></div>'); }
function renderAbout() { show('<div class="card"><h2>About Us</h2><p>Marriage Match helps people find their life partner.</p><button class="secondary" onclick="document.getElementById(\'logo\').click()">← Back</button></div>'); }
function renderSafety() { show('<div class="card"><h2>Safety Policy</h2><p>We prioritize your safety and privacy.</p><button class="secondary" onclick="document.getElementById(\'logo\').click()">← Back</button></div>'); }
function renderDisclaimer() { show('<div class="card"><h2>Disclaimer</h2><p>Marriage Match is a facilitator. Use at your own discretion.</p><button class="secondary" onclick="document.getElementById(\'logo\').click()">← Back</button></div>'); }

document.getElementById('logo').onclick = () => {
  if (!currentUser) renderAuth();
  else if (currentProfile?.role === 'admin') show('<h2>Admin Dashboard</h2><div class="card">Dashboard coming soon...</div>');
  else if (currentProfile?.status === 'approved') renderBrowse();
  else show('<div class="card" style="text-align:center;padding:30px;"><div style="font-size:48px;">⏳</div><h2>Account Pending</h2><p>Admin will review your profile soon.</p></div>');
};

auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) {
    currentProfile = await getProfile(user.uid);
    if (!currentProfile) { await auth.signOut(); return; }
    renderNav();
    if (currentProfile.role === 'admin') show('<h2>Admin Dashboard</h2><div class="card">Dashboard coming soon...</div>');
    else if (currentProfile.status === 'approved') renderBrowse();
    else if (currentProfile.status === 'rejected') show('<div class="card" style="text-align:center;padding:30px;"><div style="font-size:48px;">❌</div><h2>Account Not Approved</h2><button onclick="auth.signOut()">Logout</button></div>');
    else show('<div class="card" style="text-align:center;padding:30px;"><div style="font-size:48px;">⏳</div><h2>Account Pending</h2><p>Admin will review your profile soon.</p></div>');
  } else {
    currentProfile = null;
    renderNav();
    renderAuth();
  }
});
</script>
</body>
</html>

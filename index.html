function compressPhoto(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 300; let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h*(MAX/w)); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w*(MAX/h)); h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── BROWSE ────────────────────────────────────────────────────
async function renderBrowse() {
  showLoading();
  const myGender = currentProfile?.gender || '';
  let filterGender = null;
  if (myGender === 'Male') filterGender = 'Female';
  if (myGender === 'Female') filterGender = 'Male';

  const snap = await db.collection('users').where('role','==','user').get();
  let others = snap.docs.map(d => ({ id: d.id,...d.data() }))
.filter(u => u.id!== currentUser.uid && u.status === 'approved');
  if (filterGender) others = others.filter(u => u.gender === filterGender);

  if (!others.length) {
    show(`<h2>Browse Profiles</h2><div class="card">No ${filterGender||''} profiles available yet.</div>`);
    return;
  }

  const cards = others.map(u => {
    const vis = u.visibility || {};
    const photoHtml = vis.photo && u.photo? `<img src="${u.photo}" class="avatar">` : `<div class="avatar-placeholder">👤</div>`;
    const fields = [
      {key:'age',label:'Age'},{key:'religion',label:'Religion'},{key:'complexion',label:'Complexion'},
      {key:'nationality',label:'Nationality'},{key:'location',label:'Residence'},{key:'occupation',label:'Occupation'},
      {key:'motherLanguage',label:'Mother Language'},{key:'canSpeak',label:'Can Speak'},
      {key:'maritalStatus',label:'Marital Status'},
      {key:'phone',label:'Phone'},{key:'email',label:'Email'},{key:'bio',label:'About'}
    ];
    const visRows = fields.filter(f=>vis[f.key]&&u[f.key]).map(f=>`<p class="info-row"><b>${f.label}:</b> ${u[f.key]}</p>`).join('');
    const lockedCnt = LOCKABLE.filter(f=>f.key!=='photo'&&!vis[f.key]).length;
    return `<div class="card" style="text-align:center;">
      ${photoHtml}
      <h3 style="margin:6px 0;">${u.name}</h3>
      ${vis.gender?`<span style="background:#f3d6dd;color:#b3325c;border-radius:20px;padding:2px 10px;font-size:12px;">${u.gender}</span>`:''}
      <div style="text-align:left;margin-top:10px;">${visRows}</div>
      ${lockedCnt>0?`<p style="font-size:11px;color:#aaa;margin:4px 0;">🔒 ${lockedCnt} field(s) hidden by admin</p>`:''}
      <button class="proposeBtn" data-id="${u.id}" data-name="${u.name}" style="margin-top:10px;">Propose 💍</button>
    </div>`;
  }).join('');

  show(`<h2>Browse Profiles</h2>${cards}`);
  document.querySelectorAll('.proposeBtn').forEach(btn => {
    btn.onclick = () => renderProposeForm(btn.dataset.id, btn.dataset.name);
  });
}

// ── PROPOSE ──────────────────────────────────────────────────
function renderProposeForm(toId, toName) {
  let selectedTier = null;
  show(`
    <h2>Propose to ${toName}</h2>
    <div class="alert-info" style="font-size:13px;">ℹ️ Your proposal will be reviewed by admin first. If approved, the recipient will be asked for their consent before seeing your proposal.</div>
    <div class="card">
      <div class="tier-options">
        ${Object.entries(TIERS).map(([key,t])=>`
          <button class="tierBtn" data-tier="${key}">${t.icon} ${t.label}<br><small>$${t.amount.toFixed(2)}</small><br><small style="font-weight:normal">${t.perks}</small></button>`).join('')}
      </div>
      <label class="field-label">Your Message</label>
      <textarea id="propMsg" rows="4" placeholder="Write your proposal message…"></textarea>
      <button id="sendBtn">Submit Proposal 💍</button>
      <p class="error" id="propErr"></p>
      <button class="secondary" id="backBtn">Back</button>
    </div>
  `);
  document.getElementById('backBtn').onclick = renderBrowse;
  document.querySelectorAll('.tierBtn').forEach(btn => {
    btn.onclick = () => { document.querySelectorAll('.tierBtn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); selectedTier = btn.dataset.tier; };
  });
  document.getElementById('sendBtn').onclick = async () => {
    if (!selectedTier) { document.getElementById('propErr').textContent = 'Please select a tier'; return; }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      await db.collection('proposals').add({
        fromId: currentUser.uid, fromName: currentProfile.name,
        toId, toName, tier: selectedTier,
        amount: TIERS[selectedTier].amount,
        message: document.getElementById('propMsg').value,
        adminStatus: 'pending_admin',
        userConsent: 'pending',
        paymentStatus: 'demo_unpaid',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      show(`<div class="card" style="text-align:center;padding:30px;">
        <div style="font-size:48px;">📋</div>
        <h2>Proposal Submitted!</h2>
        <div class="alert-info">Your proposal to <b>${toName}</b> has been submitted for admin review. You will be notified once it is processed.</div>
        <button id="backHome" style="margin-top:12px;">Back to Browse</button>
      </div>`);
      document.getElementById('backHome').onclick = renderBrowse;
    } catch(e) {
      document.getElementById('propErr').textContent = e.message;
      btn.disabled = false; btn.textContent = 'Submit Proposal 💍';
    }
  };
}

    db.collection('proposals').where('toId','==',currentUser.uid).get()
  ]);

  const allSent = sentSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const allRec = recSnap.docs.map(d=>({id:d.id,...d.data()}))
.filter(p => p.adminStatus === 'forwarded_to_user')
.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  const statusLabel = p => {
    if (p.adminStatus === 'pending_admin') return '<span class="badge pending">⏳ Awaiting Admin Review</span>';
    if (p.adminStatus === 'rejected_by_admin') return '<span class="badge rejected">❌ Rejected by Admin</span>';
    if (p.adminStatus === 'forwarded_to_user') {
      if (p.userConsent === 'pending') return '<span class="badge pending">⏳ Awaiting Recipient Response</span>';
      if (p.userConsent === 'agreed') return '<span class="badge approved">✅ Accepted by Recipient</span>';
      if (p.userConsent === 'declined') return '<span class="badge rejected">❌ Declined by Recipient</span>';
    }
    return '';
  };

  const receivedCards = allRec.map(p => {
    if (p.userConsent!== 'pending') {
      return `<div class="card"><b>From:</b> ${p.fromName} · <span class="badge ${p.tier}">${TIERS[p.tier]?.icon} ${p.tier}</span><br>
        <p>${p.message||''}</p>
        <span class="badge ${p.userConsent==='agreed'?'approved':'rejected'}">${p.userConsent==='agreed'?'✅ You Accepted':'❌ You Declined'}</span>
      </div>`;
    }
    return `<div class="card">
      <b>From:</b> ${p.fromName} · <span class="badge ${p.tier}">${TIERS[p.tier]?.icon} ${p.tier}</span> · $${p.amount?.toFixed(2)}
      <p style="margin:8px 0;">${p.message||''}</p>
      <div class="alert-warning" style="font-size:13px;margin:8px 0;">
        <b>Admin has forwarded this proposal to you.</b><br>Do you agree to accept this proposal?
      </div>
      <button class="green sm consentAgree" data-id="${p.id}" style="width:48%;margin:2px;">✅ I Agree</button>
      <button class="red sm consentDecline" data-id="${p.id}" style="width:48%;margin:2px;">❌ Decline</button>
    </div>`;
  }).join('');

  show(`
    <h2>Proposals Sent</h2>
    ${allSent.length===0? '<p>None yet.</p>' : allSent.map(p=>`<div class="card">
      <b>To:</b> ${p.toName} · <span class="badge ${p.tier}">${TIERS[p.tier]?.icon} ${p.tier}</span> · $${p.amount?.toFixed(2)}<br>
      <p style="margin:6px 0;">${p.message||''}</p>
      ${statusLabel(p)}
    </div>`).join('')}
    <hr class="section-divider">
    <h2>Proposals Received</h2>
    ${allRec.length===0? '<p>None yet.</p>' : receivedCards.join('')}
    <button class="secondary" id="backBtn" style="margin-top:8px;">Back to Browse</button>
  `);

  document.getElementById('backBtn').onclick = renderBrowse;

  document.querySelectorAll('.consentAgree').forEach(btn => {
    btn.onclick = async () => {
      await db.collection('proposals').doc(btn.dataset.id).update({ userConsent: 'agreed' });
      renderMyProposals();
    };
  });
  document.querySelectorAll('.consentDecline').forEach(btn => {
    btn.onclick = async () => {
      await db.collection('proposals').doc(btn.dataset.id).update({ userConsent: 'declined' });
      renderMyProposals();
    };
  });
}

// ── SUPPORT PORTAL
  .badge ${t.status==='open'?'pending':'approved'}" style="float:right;">${t.status==='open'?'Open':'Replied'}</span>
          <p style="font-size:13px;margin:6px 0;">${t.message}</p>
          ${t.adminReply ? `
            <div style="background:#f0f7f0;border-radius:8px;padding:10px;margin-top:6px;font-size:13px;">
              <b style="color:#27ae60;">Admin Reply:</b><br>${t.adminReply}

  `);

// ── ADMIN DASHBOARD ───────────────────────────────────────────
async function renderAdmin(tab = 'accounts') {
  showLoading();
  const [usersSnap, proposalsSnap, supportSnap] = await Promise.all([
    db.collection('users').get(),
    db.collection('proposals').get(),
    db.collection('support').get()
  ]);
  const users = usersSnap.docs.map(d=>({id:d.id,...d.data()}));
  const proposals = proposalsSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const tickets = supportSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const regular = users.filter(u=>u.role!=='admin');
  const pending = regular.filter(u=>u.status==='pending');
  const revenue = proposals.filter(p=>p.paymentStatus==='paid').reduce((s,p)=>s+(p.amount||0),0);
  const pendingProp = proposals.filter(p=>p.adminStatus==='pending_admin');
  const openTickets = tickets.filter(t=>t.status==='open');

  const tabs = [
    { key:'accounts', label:`👥 Accounts ${pending.length>0?`(${pending.length}⚠️)`:''}` },
    { key:'proposals', label:`💍 Proposals ${pendingProp.length>0?`(${pendingProp.length}⚠️)`:''}` },
    { key:'support', label:`💬 Support ${openTickets.length>0?`(${openTickets.length}⚠️)`:''}` }
  ];

  show(`
    <h2>Admin Dashboard</h2>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">${regular.length}</div><div>Users</div></div>
      <div class="stat-box"><div class="stat-num">${pending.length}</div><div>Pending</div></div>
      <div class="stat-box"><div class="stat-num">${proposals.length}</div><div>Proposals</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#27ae60;">$${revenue.toFixed(2)}</div><div>Revenue</div></div>
    </div>
    <div class="tab-row">
      ${tabs.map(t=>`<button class="tab-btn ${tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
    </div>
    <div id="tabContent"></div>
  `);

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => renderAdmin(btn.dataset.tab);
  });

  const content = document.getElementById('tabContent');

  if (tab === 'accounts') {
    content.innerHTML = `
      <h3>Pending Approval (${pending.length})</h3>
      ${pending.length===0?'<p style="color:#888;">No pending accounts.</p>':pending.map(u=>adminUserCard(u,true)).join('')}
      <hr class="section-divider">
      <h3>All Users</h3>
      ${regular.filter(u=>u.status!=='pending').map(u=>adminUserCard(u,false)).join('')}
    `;
  }

  if (tab === 'proposals') {
    content.innerHTML = `
      <h3>Pending Admin Review (${pendingProp.length})</h3>
      ${pendingProp.length===0?'<p style="color:#888;">No pending proposals.</p>':pendingProp.map(p=>`
        <div class="card">
          <b>From:</b> ${p.fromName} → <b>To:</b> ${p.toName}<br>
          <span class="badge ${p.tier}">${TIERS[p.tier]?.icon} ${p.tier}</span> · $${p.amount?.toFixed(2)}<br>
          <p style="font-size:13px;margin:8px 0;">"${p.message||''}"</p>
          <button class="green sm adminForward" data-id="${p.id}" style="width:48%;">✅ Approve & Forward</button>
          <button class="red sm adminRejectProp" data-id="${p.id}" style="width:48%;">❌ Reject</button>
        </div>`).join('')}
      <hr class="section-divider">
      <h3>All Proposals</h3>
      <div class="card" style="padding:0;overflow:auto;">
        <table>
          <tr><th>From</th><th>To</th><th>Tier</th><th>Admin</th><th>Consent</th></tr>
          ${proposals.map(p=>`<tr>
            <td>${p.fromName}</td><td>${p.toName}</td>
            <td><span class="badge ${p.tier}">${TIERS[p.tier]?.icon}</span></td>
            <td>${p.adminStatus?.replace(/_/g,' ')||'—'}</td>
            <td>${p.userConsent||'—'}</td>
          </tr>`).join('')}
        </table>
      </div>
    `;
    document.querySelectorAll('.adminForward').forEach(btn => {
      btn.onclick = async () => {
        await db.collection('proposals').doc(btn.dataset.id).update({ adminStatus: 'forwarded_to_user', userConsent: 'pending' });
        renderAdmin('proposals');
      };
    });
    document.querySelectorAll('.adminRejectProp').forEach(btn => {
      btn.onclick = async () => {
        await db.collection('proposals').doc(btn.dataset.id).update({ adminStatus: 'rejected_by_admin' });
        renderAdmin('proposals');
      };
    });
  }

  if (tab === 'support') {
    content.innerHTML = `
      <h3>Open Tickets (${openTickets.length})</h3>
      ${tickets.length===0?'<p style="color:#888;">No support messages yet.</p>':tickets.map(t=>`
        <div class="card">
          <b>${t.subject}</b>
          <span class="badge ${t.status==='open'?'pending':'approved'}" style="float:right;">${t.status}</span>
          <p style="font-size:12px;color:#888;margin:2px 0;">${t.userName} · ${t.userEmail}</p>
          <p style="font-size:13px;margin:8px 0;">${t.message}</p>
          ${t.adminReply?`<div style="background:#f0f7f0;border-radius:8px;padding:8px;font-size:13px;margin-bottom:8px;"><b style="color:#27ae60;">Your Reply:</b> ${t.adminReply}</div>`:''}
          ${t.status==='open'?`
            <textarea id="reply_${t.id}" rows="2" placeholder="Type your reply…"></textarea>
            <button class="sm green adminReply" data-id="${t.id}" style="margin-top:4px;">Send Reply</button>
          `:'<span class="badge approved">✅ Resolved</span>'}
        </div>`).join('')}
    `;
    document.querySelectorAll('.adminReply').forEach(btn => {
      btn.onclick = async () => {
        const reply = document.getElementById(`reply_${btn.dataset.id}`).value.trim();
        if (!reply) return;
        await db.collection('support').doc(btn.dataset.id).update({ adminReply: reply, status: 'replied' });
        renderAdmin('support');
      };
    });
  }

  document.querySelectorAll('.deleteBtn').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm(`Delete account for "${btn.dataset.name}"? This cannot be undone.`)) return;
      await db.collection('users').doc(btn.dataset.uid).delete();
      const pSnap = await db.collection('proposals').where('fromId','==',btn.dataset.uid).get();
      pSnap.forEach(d => d.ref.delete());
      renderAdmin(tab);
    };
  });
  document.querySelectorAll('.approveBtn').forEach(btn => {
    btn.onclick = async () => {
      await db.collection('users').doc(btn.dataset.uid).update({ status: 'approved' });
      renderAdmin('accounts');
    };
  });
  document.querySelectorAll('.rejectBtn').forEach(btn => {
    btn.onclick = async () => {
      await db.collection('users').doc(btn.dataset.uid).update({ status: 'rejected' });
      renderAdmin('accounts');
    };
  });
  document.querySelectorAll('.toggleBtn').forEach(btn => {
    btn.onclick = async () => {
      const cur = btn.dataset.current === 'true';
      const newVal = !cur;
      await db.collection('users').doc(btn.dataset.uid).update({ [`visibility.${btn.dataset.field}`]: newVal });
      btn.dataset.current = newVal;
      btn.textContent = newVal ? '🔓 Visible' : '🔒 Hidden';
      btn.className = `sm toggleBtn ${newVal?'green':'gray'}`;
    };
  });
}

function adminUserCard(u, showApproval) {
  const vis = u.visibility || {};
  const photoHtml = u.photo
    ? `<img src="${u.photo}" style="width:55px;height:55px;border-radius:50%;object-fit:cover;float:left;margin-right:10px;">`
    : `<div style="width:55px;height:55px;border-radius:50%;background:#f3d6dd;display:inline-flex;align-items:center;justify-content:center;font-size:20px;float:left;margin-right:10px;">👤</div>`;

  const statusBadge = u.status === 'approved' ? '<span class="badge approved">✅ Approved</span>'
    : u.status === 'rejected' ? '<span class="badge rejected">❌ Rejected</span>'
    : '<span class="badge pending">⏳ Pending</span>';

  const approvalBtns = showApproval ? `
    <div style="margin:10px 0;">
      <button class="sm green approveBtn" data-uid="${u.id}" style="width:48%;">✅ Approve</button>
      <button class="sm red rejectBtn" data-uid="${u.id}" style="width:48%;">❌ Reject</button>
      <button class="sm red deleteBtn" data-uid="${u.id}" data-name="${u.name}" style="width:100%;margin-top:4px;background:#7f0000;">🗑️ Delete Account</button>
    </div>` : `
    <div style="margin:8px 0;">
      <button class="sm red deleteBtn" data-uid="${u.id}" data-name="${u.name}" style="width:100%;background:#7f0000;">🗑️ Delete Account</button>
    </div>`;

  const allFields = [
    {key:'photo',label:'Photo',val:u.photo?'(uploaded)':'—'},
    {key:'age',label:'Age',val:u.age},{key:'gender',label:'Gender',val:u.gender},
    {key:'religion',label:'Religion',val:u.religion},{key:'complexion',label:'Complexion',val:u.complexion},
    {key:'nationality',label:'Nationality',val:u.nationality},{key:'location',label:'Residence',val:u.location},
    {key:'occupation',label:'Occupation',val:u.occupation},{key:'motherLanguage',label:'Mother Lang',val:u.motherLanguage},
    {key:'canSpeak',label:'Can Speak',val:u.canSpeak},{key:'maritalStatus',label:'Marital Status',val:u.maritalStatus},{key:'phone',label:'Phone',val:u.phone},
    {key:'email',label:'Email',val:u.email},{key:'bio',label:'About',val:u.bio}
  ];

  const toggles = allFields.map(f=>{
    const isVis = vis[f.key]===true;
    return `<div class="toggle-row">
      <span><b>${f.label}:</b> ${f.val||'—'}</span>
      <button class="sm toggleBtn ${isVis?'green':'gray'}" data-uid="${u.id}" data-field="${f.key}" data-current="${isVis}">
        ${isVis?'🔓 Visible':'🔒 Hidden'}
      </button>
    </div>`;
  }).join('');

  return `<div class="card">
    <div style="overflow:hidden;">
      ${photoHtml}
      <div><b>${u.name}</b> ${statusBadge}<br>
        <span style="font-size:12px;color:#888;">${u.email}</span><br>
        <span style="font-size:11px;color:#b3325c;">${u.gender||''} · ${u.createdAt?.toDate?.()?.toLocaleDateString()||'—'}</span>
      </div>
    </div>
    <div style="clear:both;"></div>
    ${approvalBtns}
    <details style="margin-top:8px;"><summary style="font-size:13px;color:#b3325c;cursor:pointer;">Toggle field visibility</summary>
      <div style="margin-top:6px;">${toggles}</div>
    </details>
  </div>`;
}

// ── AUTH STATE ────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) {
    currentProfile = await getProfile(user.uid);
    if (!currentProfile) { await auth.signOut(); return; }
    renderNav();
    if (currentProfile.role === 'admin') renderAdmin();
    else if (currentProfile.status === 'approved') renderBrowse();
    else if (currentProfile.status === 'rejected') renderRejectedScreen();
    else renderPendingScreen();
  } else {
    currentProfile = null;
    renderNav();
    renderAuth();
  }
});

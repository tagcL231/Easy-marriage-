// ---------- Photo compression ----------
function compressPhoto(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const MAX = 400;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    $('loginError').classList.remove('hidden');

  const name = $('signupName').value.trim();
  const email = $('signupEmail').value.trim();
  const password = $('signupPass').value;
  const gender = $('signupGender').value;
  const marital = $('signupMarital').value;
  const age = $('signupAge').value;
  const religion = $('signupReligion').value;
  const country = $('signupCountry').value.trim();
  const city = $('signupCity').value.trim();
  const phone = $('signupPhone').value.trim();
  const bio = $('signupBio').value.trim();
  const photoFile = $('signupPhoto').files[0];

  btn.disabled = true; btn.textContent = 'Creating account…';
  $('signupError').classList.add('hidden');

  try {
    let photoB64 = '';
    if (photoFile) photoB64 = await new Promise(resolve => compressPhoto(photoFile, resolve));

    const cred = await auth.createUserWithEmailAndPassword(email, password);
    const role = email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? 'admin' : 'user';

    await db.collection('users').doc(cred.user.uid).set({
      name, email, gender, maritalStatus: marital, age: parseInt(age, 10),
      religion, country, city, phone, bio, photo: photoB64,
      role, status: role === 'admin' ? 'approved' : 'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await auth.signOut();
    showPage('login');
    const infoBanner = document.createElement('div');
    infoBanner.className = 'alert alert-success';
    infoBanner.style.maxWidth = '440px';
    infoBanner.style.margin = '0 auto 16px';
    infoBanner.textContent = 'Account created. Once approved you can log in and start browsing.';
    $('app').prepend(infoBanner);
  } catch (error) {
    $('signupError').textContent = friendlyAuthError(error);
    $('signupError').classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Create account';
  }
}

function friendlyAuthError(error) {
  const map = {
    'auth/email-already-in-use': 'That email address already has an account. Try logging in instead.',
    'auth/invalid-email': 'That email address doesn\'t look right.',
    'auth/weak-password': 'Please choose a stronger password (at least 8 characters).',
    'auth/wrong-password': 'Incorrect email or password.',
    'auth/user-not-found': 'Incorrect email or password.',
    'auth/invalid-credential': 'Incorrect email or password.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.'
  };
  return map[error.code] || error.message;
}

async function logout() {
  await auth.signOut();
}

// ---------- Browse & proposals ----------
async function getSentProposalsMap() {
  const snap = await db.collection('proposals').where('fromUid', '==', currentUser.uid).get();
  const map = {};
  snap.forEach(d => map[d.data().toUid] = { id: d.id, ...d.data() });
  return map;
}

async function loadProfiles() {
  try {
    const [snap, sentMap] = await Promise.all([
      db.collection('users').where('status', '==', 'approved').get(),
      getSentProposalsMap()
    ]);
    const profiles = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.id !== currentUser.uid);
    usersCache = { ...usersCache, ...Object.fromEntries(profiles.map(p => [p.id, p])) };

    if (profiles.length === 0) {
      show('app', `<h2 style="margin-bottom:10px;">Browse Profiles</h2><div class="card text-center text-muted">No approved profiles yet — check back soon.</div>`);
      return;
    }

    let html = '<h2 style="margin-bottom:14px;">Browse Profiles</h2><div class="grid">';
    profiles.forEach(p => {
      const existing = sentMap[p.id];
      let actionHtml = `<button class="btn btn-primary btn-sm btn-block stamp-btn" onclick="sendProposal('${p.id}', this)">Send Proposal</button>`;
      if (existing) {
        if (existing.status === 'pending') actionHtml = `<span class="badge badge-pending" style="display:block;">Proposal Sent</span>`;
        else if (existing.status === 'accepted') actionHtml = `<span class="badge badge-accepted" style="display:block;">Matched — go to Chat</span>`;
        else if (existing.status === 'declined') actionHtml = `<span class="badge badge-declined" style="display:block;">Declined</span>`;
      }
      html += `
        <div class="profile-card">
          ${p.photo ? `<img src="${p.photo}" class="profile-avatar" alt="${esc(p.name)}">` : `<div class="profile-avatar-placeholder">${esc((p.name || '?')[0])}</div>`}
          <div class="profile-name">${esc(p.name)}</div>
          <div class="profile-info">${esc(p.age)} yrs · ${esc(p.city)}, ${esc(p.country)}</div>
          <div class="profile-info text-muted">${esc(p.maritalStatus)} · ${esc(p.religion)}</div>
          <div style="margin-top:10px;">${actionHtml}</div>
        </div>
      `;
    });
    html += '</div>';
    show('app', html);
  } catch (error) {
    show('app', `<div class="alert alert-error">Couldn't load profiles: ${esc(error.message)}</div>`);
  }
}

async function sendProposal(toUid, btnEl) {
  btnEl.disabled = true;
  btnEl.classList.add('stamp-anim');
  try {
    const existing = await db.collection('proposals')
      .where('fromUid', '==', currentUser.uid).where('toUid', '==', toUid).limit(1).get();
    if (!existing.empty) { showPage('browse'); return; }

    await db.collection('proposals').add({
      fromUid: currentUser.uid,
      toUid,
      status: 'pending',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setTimeout(() => showPage('browse'), 350);
  } catch (error) {
    alert('Could not send proposal: ' + error.message);
    btnEl.disabled = false;
  }
}

async function fetchUserProfile(uid) {
  if (usersCache[uid]) return usersCache[uid];
  const doc = await db.collection('users').doc(uid).get();
  const data = doc.exists ? { id: uid, ...doc.data() } : { id: uid, name: 'Unknown member' };
  usersCache[uid] = data;
  return data;
}

async function switchProposalTab(which) {
  $('tab-received').classList.toggle('active', which === 'received');
  $('tab-sent').classList.toggle('active', which === 'sent');
  show('proposalsContent', '<div class="loading">Loading…</div>');

  const field = which === 'received' ? 'toUid' : 'fromUid';
  const snap = await db.collection('proposals').where(field, '==', currentUser.uid).get();
  let proposals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  proposals.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

  if (proposals.length === 0) {
    show('proposalsContent', `<p class="text-muted" style="padding:20px 0;">No ${which} proposals yet.</p>`);
    return;
  }

  const otherUids = proposals.map(p => which === 'received' ? p.fromUid : p.toUid);
  const others = await Promise.all(otherUids.map(fetchUserProfile));

  let html = '';
  proposals.forEach((p, i) => {
    const other = others[i];
    const badge = p.status === 'pending' ? '<span class="badge badge-pending">Pending</span>'
      : p.status === 'accepted' ? '<span class="badge badge-accepted">Accepted</span>'
      : '<span class="badge badge-declined">Declined</span>';
    let actions = '';
    if (which === 'received' && p.status === 'pending') {
      actions = `<button class="btn btn-success btn-sm" onclick="respondProposal('${p.id}','${p.fromUid}','accepted')">Accept</button>
                 <button class="btn btn-danger btn-sm" onclick="respondProposal('${p.id}','${p.fromUid}','declined')">Decline</button>`;
    } else if (which === 'sent' && p.status === 'pending') {
      actions = `<button class="btn btn-secondary btn-sm" onclick="cancelProposal('${p.id}')">Cancel</button>`;
    } else if (p.status === 'accepted') {
      actions = `<button class="btn btn-secondary btn-sm" onclick="showPage('chat')">Message</button>`;
    }
    html += `
      <div class="prop-row">
        ${other.photo ? `<img src="${other.photo}" class="prop-avatar" alt="">` : `<div class="prop-avatar" style="display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;color:var(--slate);">${esc((other.name||'?')[0])}</div>`}
        <div class="prop-meta">
          <div class="prop-name">${esc(other.name)}</div>
          <div class="text-muted">${esc(other.city || '')}${other.country ? ', ' + esc(other.country) : ''}</div>
          ${badge}
        </div>
        <div class="prop-actions">${actions}</div>
      </div>
    `;
  });
  show('proposalsContent', html);
}

async function respondProposal(proposalId, fromUid, decision) {
  try {
    await db.collection('proposals').doc(proposalId).update({ status: decision });
    if (decision === 'accepted') {
      const mId = matchIdFor(currentUser.uid, fromUid);
      await db.collection('matches').doc(mId).set({
        users: [currentUser.uid, fromUid],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    switchProposalTab('received');
  } catch (error) {
    alert('Something went wrong: ' + error.message);
  }
}

async function cancelProposal(proposalId) {
  try {
    await db.collection('proposals').doc(proposalId).delete();
    switchProposalTab('sent');
  } catch (error) {
    alert('Something went wrong: ' + error.message);
  }
}

// ---------- Profile page ----------
function loadProfilePage() {
  const p = currentProfile;
  show('profileContent', `
    <div class="text-center" style="margin-bottom:18px;">
      ${p.photo ? `<img src="${p.photo}" class="profile-avatar" style="width:110px;height:110px;">` : `<div class="profile-avatar-placeholder" style="width:110px;height:110px;font-size:36px;">${esc((p.name||'?')[0])}</div>`}
    </div>
    <form onsubmit="handleProfileUpdate(event)">
      <div class="form-row">
        <div class="form-group"><label>Full name</label><input type="text" id="pfName" value="${esc(p.name)}" required></div>
        <div class="form-group"><label>Age</label><input type="number" id="pfAge" min="18" max="100" value="${esc(p.age)}" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Country / region</label><input type="text" id="pfCountry" value="${esc(p.country)}" required></div>
        <div class="form-group"><label>City</label><input type="text" id="pfCity" value="${esc(p.city)}" required></div>
      </div>
      <div class="form-group"><label>Phone number</label><input type="tel" id="pfPhone" value="${esc(p.phone || '')}"></div>
      <div class="form-group"><label>About you</label><textarea id="pfBio" rows="3" maxlength="500">${esc(p.bio || '')}</textarea></div>
      <div class="form-group"><label>Update profile photo</label><input type="file" id="pfPhoto" accept="image/*"></div>
      <div id="profileMsg" class="alert hidden"></div>
      <button type="submit" class="btn btn-primary" id="pfSaveBtn">Save changes</button>
    </form>
    <hr style="margin:24px 0;border:none;border-top:1px solid var(--line);">
    <p class="text-muted">Email: ${esc(p.email)} &nbsp;·&nbsp; Status: <span class="badge badge-accepted" style="text-transform:capitalize;">${esc(p.status)}</span></p>
  `);
}

async function handleProfileUpdate(e) {
  e.preventDefault();
  const btn = $('pfSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const msg = $('profileMsg'); msg.classList.add('hidden');
  try {
    const updates = {
      name: $('pfName').value.trim(),
      age: parseInt($('pfAge').value, 10),
      country: $('pfCountry').value.trim(),
      city: $('pfCity').value.trim(),
      phone: $('pfPhone').value.trim(),
      bio: $('pfBio').value.trim()
    };
    const photoFile = $('pfPhoto').files[0];
    if (photoFile) {
      updates.photo = await new Promise(resolve => compressPhoto(photoFile, resolve));
    }
    await db.collection('users').doc(currentUser.uid).update(updates);
    currentProfile = { ...currentProfile, ...updates };
    updateNavbar();
    loadProfilePage();
    const freshMsg = $('profileMsg');
    freshMsg.className = 'alert alert-success';
    freshMsg.textContent = 'Profile updated.';
    freshMsg.classList.remove('hidden');
  } catch (error) {
    msg.className = 'alert alert-error';
    msg.textContent = error.message;
    msg.classList.remove('hidden');
  } finally {
    const b = $('pfSaveBtn');
    if (b) { b.disabled = false; b.textContent = 'Save changes'; }
  }
}

// ---------- Chat ----------
function detachChatListener() {
  if (unsubMatches) { unsubMatches(); unsubMatches = null; }
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  activeMatchId = null;
}

function loadChatList() {
  unsubMatches = db.collection('matches')
    .where('users', 'array-contains', currentUser.uid)
    .onSnapshot(async (snap) => {
      const matches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (matches.length === 0) {
        show('chatList', `<p class="text-muted" style="padding:16px;">No matches yet. Accepted proposals appear here.</p>`);
        return;
      }
      const others = await Promise.all(matches.map(m => fetchUserProfile(m.users.find(u => u !== currentUser.uid))));
      let html = '';
      matches.forEach((m, i) => {
        html += `<div class="chat-list-item ${m.id === activeMatchId ? 'active' : ''}" onclick="openChat('${m.id}', '${others[i].id}')">${esc(others[i].name)}</div>`;
      });
      show('chatList', html);
    }, (err) => show('chatList', `<p class="text-muted" style="padding:16px;">${esc(err.message)}</p>`));
}

function openChat(matchId, otherUid) {
  activeMatchId = matchId;
  document.querySelectorAll('.chat-list-item').forEach(el => el.classList.remove('active'));
  loadChatList();

  $('chatInput').disabled = false;
  $('chatSendBtn').disabled = false;
  $('chatInput').placeholder = 'Type a message…';
  $('chatInput').dataset.matchId = matchId;

  if (unsubMessages) unsubMessages();
  unsubMessages = db.collection('matches').doc(matchId).collection('messages')
    .orderBy('createdAt', 'asc')
    .onSnapshot((snap) => {
      let html = '';
      snap.forEach(d => {
        const m = d.data();
        html += `<div class="msg ${m.from === currentUser.uid ? 'msg-mine' : 'msg-theirs'}">${esc(m.text)}</div>`;
      });
      const box = $('chatMessages');
      if (box) {
        box.style.display = 'flex';
        box.innerHTML = html || '<p class="text-muted">Say hello 👋</p>';
        box.scrollTop = box.scrollHeight;
      }
    });
}

async function sendMessage() {
  const input = $('chatInput');
  const text = input.value.trim();
  const matchId = input.dataset.matchId;
  if (!text || !matchId) return;
  input.value = '';
  try {
    await db.collection('matches').doc(matchId).collection('messages').add({
      from: currentUser.uid,
      text,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (error) {
    alert('Message failed to send: ' + error.message);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'chatInput') {
    sendMessage();
  }
});

// ---------- Admin ----------
async function switchAdminTab(which) {
  $('admtab-pending').classList.toggle('active', which === 'pending');
  $('admtab-all').classList.toggle('active', which === 'all');
  show('adminContent', '<div class="loading">Loading…</div>');

  let query = db.collection('users');
  query = which === 'pending' ? query.where('status', '==', 'pending') : query;
  const snap = await query.get();
  let users = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(u => u.role !== 'admin');

  if (users.length === 0) {
    show('adminContent', `<p class="text-muted" style="padding:20px 0;">Nothing to show here.</p>`);
    return;
  }

  let html = '';
  users.forEach(u => {
    const statusBadge = u.status === 'approved' ? '<span class="badge badge-accepted">Approved</span>'
      : u.status === 'pending' ? '<span class="badge badge-pending">Pending</span>'
      : '<span class="badge badge-declined">Rejected</span>';
    let actions = '';
    if (u.status === 'pending') {
      actions = `<button class="btn btn-success btn-sm" onclick="setUserStatus('${u.id}','approved')">Approve</button>
                 <button class="btn btn-danger btn-sm" onclick="setUserStatus('${u.id}','rejected')">Reject</button>`;
    } else if (u.status === 'approved') {
      actions = `<button class="btn btn-danger btn-sm" onclick="setUserStatus('${u.id}','suspended')">Suspend</button>`;
    } else {
      actions = `<button class="btn btn-secondary btn-sm" onclick="setUserStatus('${u.id}','approved')">Reinstate</button>`;
    }
    html += `
      <div class="admin-row">
        <div>
          <strong>${esc(u.name)}</strong> ${statusBadge}<br>
          <span class="text-muted">${esc(u.email)} · ${esc(u.age)} yrs · ${esc(u.city)}, ${esc(u.country)}</span>
        </div>
        <div class="prop-actions">${actions}</div>
      </div>
    `;
  });
  show('adminContent', html);
}

async function setUserStatus(uid, status) {
  try {
    await db.collection('users').doc(uid).update({ status });
    const activeTab = document.getElementById('admtab-pending').classList.contains('active') ? 'pending' : 'all';
    switchAdminTab(activeTab);
  } catch (error) {
    alert('Could not update member: ' + error.message);
  }
}

// ---------- Auth state ----------
auth.onAuthStateChanged(async (user) => {
  currentUser = user;
  if (user) {
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      currentProfile = doc.exists ? doc.data() : null;
    } catch (e) {
      currentProfile = null;
    }
    if (!currentProfile) { await auth.signOut(); return; }
    updateNavbar();
    if (currentProfile.role === 'admin') {
      showPage('admin-dashboard');
    } else if (currentProfile.status === 'approved') {
      showPage('browse');
    } else if (currentProfile.status === 'pending') {
      show('app', `<div class="card text-center" style="padding:50px 20px;"><h2>Your profile is under review</h2><p class="text-muted" style="margin-top:8px;">Our team typically reviews new profiles within 24–48 hours. We'll be in touch by email once you're approved.</p></div>`);
    } else {
      show('app', `<div class="card text-center" style="padding:50px 20px;"><h2>This account is not active</h2><p class="text-muted" style="margin-top:8px;">Please contact support if you believe this is a mistake.</p></div>`);
    }
  } else {
    currentProfile = null;
    updateNavbar();
    showPage('login');
  }
});

updateNavbar();
</script>
